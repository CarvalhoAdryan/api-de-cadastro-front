<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-image: linear-gradient(45deg,cyan,blue);
        }
        div{
            background-color: rgba(0, 0, 0, 0.9);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            padding: 80px;
            border-radius: 15px;
            color: white;
        }
        input{
            padding: 15px;
            border: none;
            outline: none;
        }
        button{
            background-color: dodgerblue;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            color: white;
            font-size: 15px;
        }
        button:hover{
            background-color: aqua;
        }
        a{
            color: white;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="TelaRegistrar">
        <form id="RegistrarForm"><h1>Registrar</h1>
        <input type="text" placeholder="Nome" id="Nome">
        <br><br>
        <input type="email" placeholder="Email" id="Email">
        <br><br>
        <input type="password" placeholder="Senha" id="Senha">
        <br><br>
        <button type="submit" id="submit">Enviar</button>
        </form>
        <br>
        <a href="login.html">Já tem conta?</a>
    </div>

    <script src="https://unpkg.com/axios@1.13.5/dist/axios.min.js"></script>
    <script src="Register.js></script>
</body>
</html>
